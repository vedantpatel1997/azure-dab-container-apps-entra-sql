name: deploy-dab

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: be945e7a-2e17-4b44-926f-512e85873eec
          subscription-id: 6a3bb170-5159-4bff-860b-aa74fb762697

      - name: Build image in ACR
        shell: bash
        run: |
          az acr build \
            --registry "acrvkpvmerdr" \
            --resource-group "rg-vkp-vmerdr" \
            --image "vkp-dab-api:${GITHUB_SHA}" \
            ./dab

      - name: Update Container App
        shell: bash
        run: |
          az containerapp update \
            --name "ca-vkp-vmerdr" \
            --resource-group "rg-vkp-vmerdr" \
            --image "acrvkpvmerdr.azurecr.io/vkp-dab-api:${GITHUB_SHA}" \
            --set-env-vars "AZURE_CLIENT_ID=d57a76de-32ba-4c84-987e-4170dca4624f"
