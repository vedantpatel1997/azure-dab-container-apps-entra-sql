name: infra

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "apply"
        type: choice
        options:
          - plan
          - apply
          - destroy
          - recreate
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "scripts/Bootstrap-Sql.ps1"
      - ".github/workflows/infra.yml"

permissions:
  id-token: write
  contents: read
  actions: write

env:
  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  TF_IN_AUTOMATION: true

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Ensure Terraform backend exists
        shell: bash
        run: |
          set -euo pipefail
          az group create \
            --name "${{ vars.TF_STATE_RESOURCE_GROUP }}" \
            --location "westus3"

          if ! az storage account show \
            --name "${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            --resource-group "${{ vars.TF_STATE_RESOURCE_GROUP }}" >/dev/null 2>&1; then
            az storage account create \
              --name "${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
              --resource-group "${{ vars.TF_STATE_RESOURCE_GROUP }}" \
              --location "westus3" \
              --sku Standard_LRS \
              --kind StorageV2 \
              --allow-blob-public-access false \
              --min-tls-version TLS1_2
          fi

          az storage container create \
            --account-name "${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            --name "${{ vars.TF_STATE_CONTAINER }}" \
            --auth-mode login

      - name: Add runner IP for SQL bootstrap
        shell: pwsh
        working-directory: terraform
        run: |
          $ip = (Invoke-RestMethod "https://api.ipify.org").Trim()
          @{
            allowed_ip_addresses = @{
              GitHubRunner = $ip
            }
          } | ConvertTo-Json -Depth 10 | Set-Content -Path "github.auto.tfvars.json" -Encoding ascii

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="tenant_id=${{ vars.AZURE_TENANT_ID }}" \
            -backend-config="client_id=${{ vars.AZURE_CLIENT_ID }}" \
            -backend-config="subscription_id=${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}"

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        if: ${{ github.event.inputs.action == 'plan' }}
        working-directory: terraform
        run: terraform plan

      - name: Terraform destroy
        if: ${{ github.event.inputs.action == 'destroy' || github.event.inputs.action == 'recreate' }}
        working-directory: terraform
        run: terraform destroy -auto-approve

      - name: Terraform apply
        if: ${{ github.event_name == 'push' || github.event.inputs.action == 'apply' || github.event.inputs.action == 'recreate' }}
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Update GitHub deployment variables
        if: ${{ github.event_name == 'push' || github.event.inputs.action == 'apply' || github.event.inputs.action == 'recreate' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        working-directory: terraform
        run: |
          $outputs = terraform output -json | ConvertFrom-Json
          $acrLogin = $outputs.acr_login_server.value
          $vars = @{
            AZURE_ACR_NAME = $acrLogin.Split(".")[0]
            AZURE_ACR_LOGIN_SERVER = $acrLogin
            AZURE_CONTAINER_APP_NAME = $outputs.container_app_name.value
            AZURE_CONTAINER_APP_URL = $outputs.container_app_url.value
            AZURE_RESOURCE_GROUP = $outputs.resource_group_name.value
            AZURE_UAMI_CLIENT_ID = $outputs.uami_client_id.value
            DAB_API_AUDIENCE = $outputs.api_audience.value
            DAB_API_SCOPE = $outputs.api_scope.value
            DAB_JWT_ISSUER = $outputs.jwt_issuer.value
            DAB_KEY_VAULT_URI = $outputs.key_vault_uri.value
          }

          foreach ($name in $vars.Keys) {
            gh variable set $name --body $vars[$name]
          }

      - name: Render DAB config
        if: ${{ github.event_name == 'push' || github.event.inputs.action == 'apply' || github.event.inputs.action == 'recreate' }}
        shell: pwsh
        run: ./scripts/Render-DabConfig.ps1

      - name: Bootstrap SQL
        if: ${{ github.event_name == 'push' || github.event.inputs.action == 'apply' || github.event.inputs.action == 'recreate' }}
        shell: pwsh
        run: ./scripts/Bootstrap-Sql.ps1
